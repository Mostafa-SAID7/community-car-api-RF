name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore CommunityCarApi.sln
    
    - name: Build
      run: dotnet build CommunityCarApi.sln --no-restore --configuration Release
    
    - name: Test
      run: dotnet test CommunityCarApi.sln --no-build --configuration Release --verbosity normal
    
    - name: Publish
      run: dotnet publish src/CommunityCarApi.WebApi/CommunityCarApi.WebApi.csproj --no-build --configuration Release --output ./publish
    
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: backend-api
        path: ./publish
